<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnezia Panel - Users Management</title>
    <link href="/static/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen" x-data="usersPanel()" x-init="init()">
        <!-- Header -->
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between items-center h-16">
                    <div class="flex gap-4">
                        <h1 class="text-xl font-bold">Amnezia Panel</h1>
                        <a href="/admin" class="text-gray-600 hover:text-gray-900">Admin</a>
                    </div>
                    <button @click="logout" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 py-6">
            <!-- Error Message -->
            <div x-show="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span x-text="error"></span>
            </div>

            <!-- Success Message -->
            <div x-show="success" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                <span x-text="success"></span>
            </div>

            <!-- Add User Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-lg font-bold mb-4">Add New User</h2>
                <form @submit.prevent="addUser">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                        <input type="text" x-model="newUser.username"
                               class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                               placeholder="Username" required>
                        <input type="password" x-model="newUser.password"
                               class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                               placeholder="Password" required>
                        <select x-model="newUser.role" 
                                class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                        <button type="submit" 
                                class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 whitespace-nowrap"
                                :disabled="adding">
                            <span x-show="!adding">Add User</span>
                            <span x-show="adding">Adding...</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-lg font-bold mb-4">Users</h2>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-4 py-2 text-left">Username</th>
                                <th class="px-4 py-2 text-left">Role</th>
                                <th class="px-4 py-2 text-left">Created</th>
                                <th class="px-4 py-2 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="user in users" :key="user.id">
                                <tr class="border-t">
                                    <td class="px-4 py-2" x-text="user.username"></td>
                                    <td class="px-4 py-2">
                                        <span class="px-2 py-1 rounded text-sm"
                                              :class="user.role === 'admin' ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800'"
                                              x-text="user.role"></span>
                                    </td>
                                    <td class="px-4 py-2 text-sm text-gray-600" x-text="new Date(user.created_at).toLocaleDateString()"></td>
                                    <td class="px-4 py-2">
                                        <button @click="editUser(user)" 
                                                class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600 mr-2">
                                            Edit
                                        </button>
                                        <button @click="deleteUserConfirm(user)" 
                                                class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600"
                                                :disabled="user.username === currentUser">
                                            Delete
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div x-show="showEditModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
             @click.self="showEditModal = false">
            <div class="bg-white rounded-lg p-6 max-w-md w-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold">Edit User</h3>
                    <button @click="showEditModal = false" class="text-gray-500 hover:text-gray-700 text-xl">✕</button>
                </div>

                <form @submit.prevent="saveUser">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Username</label>
                            <input type="text" x-model="editingUser.username"
                                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                                   placeholder="Username">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Password (leave empty to keep current)</label>
                            <input type="password" x-model="editingUser.password"
                                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                                   placeholder="New password">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Role</label>
                            <select x-model="editingUser.role" 
                                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <div class="flex gap-2 justify-end">
                            <button type="button" @click="showEditModal = false"
                                    class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-100">
                                Cancel
                            </button>
                            <button type="submit"
                                    class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                                    :disabled="saving">
                                <span x-show="!saving">Save</span>
                                <span x-show="saving">Saving...</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
    function usersPanel() {
        return {
            users: [],
            error: '',
            success: '',
            newUser: { username: '', password: '', role: 'user' },
            editingUser: null,
            showEditModal: false,
            adding: false,
            saving: false,
            currentUser: '',

            init() {
                const token = localStorage.getItem('token');
                const role = localStorage.getItem('role');
                const username = localStorage.getItem('username');

                if (!token || role !== 'admin') {
                    window.location.href = '/login';
                    return;
                }

                this.currentUser = username;
                this.fetchUsers();
            },

            async fetchUsers() {
                try {
                    const response = await fetch('/api/users', {
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        }
                    });

                    if (response.ok) {
                        this.users = await response.json();
                    } else if (response.status === 401) {
                        this.logout();
                    } else {
                        this.error = 'Failed to fetch users';
                    }
                } catch (err) {
                    this.error = 'Failed to fetch users';
                }
            },

            async addUser() {
                this.adding = true;
                this.error = '';
                this.success = '';

                try {
                    const response = await fetch('/api/users', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(this.newUser)
                    });

                    if (response.ok) {
                        this.newUser = { username: '', password: '', role: 'user' };
                        this.success = 'User created successfully';
                        setTimeout(() => this.success = '', 3000);
                        this.fetchUsers();
                    } else {
                        const error = await response.json();
                        this.error = error.detail || 'Failed to create user';
                    }
                } catch (err) {
                    this.error = 'Failed to create user';
                } finally {
                    this.adding = false;
                }
            },

            editUser(user) {
                this.editingUser = { ...user, password: '' };
                this.showEditModal = true;
            },

            async saveUser() {
                this.saving = true;
                this.error = '';
                this.success = '';

                try {
                    const response = await fetch(`/api/users/${this.editingUser.id}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: this.editingUser.username || null,
                            password: this.editingUser.password || null,
                            role: this.editingUser.role || null
                        })
                    });

                    if (response.ok) {
                        this.success = 'User updated successfully';
                        setTimeout(() => this.success = '', 3000);
                        this.showEditModal = false;
                        this.fetchUsers();
                    } else {
                        const error = await response.json();
                        this.error = error.detail || 'Failed to update user';
                    }
                } catch (err) {
                    this.error = 'Failed to update user';
                } finally {
                    this.saving = false;
                }
            },

            deleteUserConfirm(user) {
                if (!confirm(`Are you sure you want to delete user "${user.username}"?`)) {
                    return;
                }
                this.deleteUser(user.id);
            },

            async deleteUser(userId) {
                try {
                    const response = await fetch(`/api/users/${userId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        }
                    });

                    if (response.ok) {
                        this.success = 'User deleted successfully';
                        setTimeout(() => this.success = '', 3000);
                        this.fetchUsers();
                    } else {
                        const error = await response.json();
                        this.error = error.detail || 'Failed to delete user';
                    }
                } catch (err) {
                    this.error = 'Failed to delete user';
                }
            },

            logout() {
                localStorage.removeItem('token');
                localStorage.removeItem('role');
                localStorage.removeItem('username');
                window.location.href = '/login';
            }
        }
    }
    </script>
</body>
</html>
