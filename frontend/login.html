<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnezia Panel - Login</title>
    <link href="/static/tailwind.min.css" rel="stylesheet">
    <script src="/static/alpine.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (token && role) {
            if (role === 'admin') {
                window.location.replace('/admin');
            } else {
                window.location.replace('/user');
            }
        }
    </script>
    <div class="min-h-screen flex items-center justify-center" x-data="loginForm()">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold mb-6 text-center">Amnezia VPN Panel</h1>

            <div x-show="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span x-text="error"></span>
            </div>

            <form @submit.prevent="login">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                    <input type="text" x-model="username"
                           class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                           required>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" x-model="password"
                           class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                           required>
                </div>

                <button type="submit"
                        class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-600 transition"
                        :disabled="loading">
                    <span x-show="!loading">Login</span>
                    <span x-show="loading">Loading...</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function loginForm() {
            return {
                username: '',
                password: '',
                error: '',
                loading: false,

                login() {
                    this.loading = true;
                    this.error = '';

                    fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: this.username,
                            password: this.password
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.access_token) {
                            localStorage.setItem('token', data.access_token);
                            localStorage.setItem('role', data.role);
                            localStorage.setItem('username', this.username);

                            if (data.role === 'admin') {
                                window.location.href = '/admin';
                            } else {
                                window.location.href = '/user';
                            }
                        } else {
                            this.error = data.detail || 'Login failed';
                        }
                    })
                    .catch(err => {
                        this.error = 'Connection error';
                    })
                    .finally(() => {
                        this.loading = false;
                    });
                }
            }
        }
    </script>
</body>
</html>
