<!-- user.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnezia Panel - User</title>
    <link href="/static/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen" x-data="userPanel()" x-init="init()">
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between items-center h-16">
                    <h1 class="text-xl font-bold">Amnezia VPN User</h1>
                    <button @click="logout" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-lg font-bold mb-4">Your Profile</h2>
                <p class="text-gray-600">You are logged in as a regular user.</p>
            </div>
        </div>
    </div>

    <script>
        function userPanel() {
            return {
                init() {
                    const token = localStorage.getItem('token');
                    const role = localStorage.getItem('role');

                    if (!token || role !== 'user') {
                        window.location.href = '/login';
                    }
                },

                logout() {
                    localStorage.removeItem('token');
                    localStorage.removeItem('role');
                    localStorage.removeItem('username');
                    window.location.href = '/login';
                }
            }
        }
    </script>
</body>
</html>
