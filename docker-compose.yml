services:
  amnezia-panel:
    build: ./backend
    container_name: amnezia-panel
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8080:8000"
    volumes:
      - ./frontend:/frontend
      - ./backend:/app
      - ./keys:/keys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JWT_SECRET=${JWT_SECRET}
    networks:
        - panel-network
    expose:
        - "8000"
    
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - panel-network
    depends_on:
      - amnezia-panel

  telegram-bot:
    build: ./bot
    container_name: telegram-bot
    restart: unless-stopped
    volumes:
      - ./bot:/bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PANEL_URL=http://amnezia-panel:8000
      - ADMIN_IDS=${ADMIN_IDS}
      - BOT_USERNAME=${BOT_USERNAME}
      - BOT_PASSWORD=${BOT_PASSWORD}
    networks:
      - panel-network
    depends_on:
      - amnezia-panel

networks:
  panel-network:
    driver: bridge