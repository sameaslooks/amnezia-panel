global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'speedtest'
    metrics_path: /probe
    scrape_interval: 30m
    scrape_timeout: 2m
    static_configs:
      - targets:
        - 'speedtest-exporter:9516'
